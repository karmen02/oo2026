<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy</title>
    <script src="tempenergysim.js"></script> 
    <script>
        //empty container for materials
        let w = null;
        let i = null;
        let room = null;

        
        function startPage() {
            document.getElementById("output").innerText = "No materials yet. Press 'Add materials' to begin.";
        }

        //grabbing user input
        function startMaterials(){
            const wMass = document.getElementById("wmass").valueAsNumber;
            const wTemp = document.getElementById("wtemp").valueAsNumber;
            
            const iMass = document.getElementById("imass").valueAsNumber;
            const iTemp = document.getElementById("itemp").valueAsNumber;

            const rLen = document.getElementById("rlength").valueAsNumber;
            const rWid = document.getElementById("rwidth").valueAsNumber;
            const rHeight = document.getElementById("rheight").valueAsNumber;
            const rTemp = document.getElementById("rtemp").valueAsNumber;
            
            if(isNaN(wMass) || isNaN(wTemp) || isNaN(iMass) || isNaN(iTemp) || isNaN(rLen) || isNaN(rWid) || isNaN(rHeight) || isNaN(rTemp)) {
            document.getElementById("output").innerText = "Please fill all the fields!";
            return;
            }

            w = new MaterialAmount(wMass, wTemp, 4200);
            i = new MaterialAmount(iMass, iTemp, 412);
            room = new AirAmount(rLen, rWid, rHeight, rTemp);
            document.getElementById("output").innerText = "Materials added successfully.";
        }

        function addMaterials() {
            startMaterials();
        }

        function energyToWI() {
            if (!w || !i) {
                document.getElementById("output").innerText = "Add materials first.";
                return;
            }
            const energy = document.getElementById("energy").valueAsNumber;
            if (isNaN(energy)) {
                document.getElementById("output").innerText = "Please enter a valid energy value.";
                return;
            }
            w.energychange(energy);
            i.energychange(energy);
            document.getElementById("output").innerText = "Energy added. Water temp: " + w.currentTemp().toFixed(2) + "°C, Iron temp: " + i.currentTemp().toFixed(2) + "°C";
        }

        function transferEnergy() {
            if (!w || !i) {
                document.getElementById("output").innerText = "Add materials first.";
                return;
            }
            if (i.currentTemp() > w.currentTemp()) {
                i.energychange(-1000);
                w.energychange(1000);
                document.getElementById("output").innerText = "Energy transferred. Water temp: " + w.currentTemp().toFixed(2) + "°C, Iron temp: " + i.currentTemp().toFixed(2) + "°C";
            } else {
                document.getElementById("output").innerText = "No transfer needed or iron is not hotter.";
            }
        }

        function addEnergyToAir() {
            if (!room) {
                document.getElementById("output").innerText = "Add materials first.";
                return;
            }
            const energy = document.getElementById("energy").valueAsNumber;
            if (isNaN(energy)) {
                document.getElementById("output").innerText = "Please enter a valid energy value.";
                return;
            }
            room.energychange(energy);
            document.getElementById("output").innerText = "Energy added to air. Room temp: " + room.currentTemp().toFixed(2) + "°C";
        }

        function calculateFinalTemp() {
            if (!w || !i || !room) {
                document.getElementById("output").innerText = "Add materials first.";
                return;
            }
            const materials = [w, i, room];
            let totalThermalEnergy = 0;
            let totalAffect = 0;
            for (let material of materials) {
                const influence = material.affect();
                totalAffect += influence;
                totalThermalEnergy += influence * material.currentTemp();
            }
            const finalTemp = totalThermalEnergy / totalAffect;
            document.getElementById("output").innerText = "Final equal temperature: " + finalTemp.toFixed(2) + "°C";
        }


        
        
    </script>
    
</head>
<body onload="startPage()">
    <div>
        <h3>Water</h3>
        <label>Mass in kg: <input type="number" id="wmass" ></label><br>
        <label>Initial Temp C: <input type="number" id="wtemp"></label><br>
    </div>

    <div>
        <h3>Iron</h3>
        <label>Mass in kg: <input type="number" id="imass"></label><br>
        <label>Initial Temp C: <input type="number" id="itemp"></label><br>
    </div>

    <div>
        <h3>Room (Air)</h3>
        <label>Length in m: <input type="number" id="rlength"></label><br>
        <label>Width in m: <input type="number" id="rwidth"></label><br>
        <label>Height in m: <input type="number" id="rheight"></label><br>
        <label>Initial Temp C: <input type="number" id="rtemp"></label><br>
    </div>
    <div>Energy</div>
    <h3>Add energy</h3>
    <label>Energy in J <input type="number" id="energy"></label><br>
    <div>
        <button onclick="addMaterials()">Add materials</button>
        <button onclick="energyToWI()">Add Energy to Water & Iron</button>
        <button onclick="transferEnergy()">Transfer energy between Iron and Water</button>
        <button onclick="addEnergyToAir()">Add Energy to Room Air</button>
        <button onclick="calculateFinalTemp()">Calculate Equal Temp</button>
    </div>
    <h2 id="output"></h2>
</body>
</html>
