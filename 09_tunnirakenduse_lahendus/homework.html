<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freezer</title>
    <script src="homework.js" defer></script> 
    <script>
        //empty container
        let water = null;
        
        function startPage(){
            document.getElementById("output").innerText = "No water yet";
        }
        //grabbing user input
        function startFreezer(){
            const amount = document.getElementById("amount").valueAsNumber;
            const temp = document.getElementById("temp").valueAsNumber;
            const power = document.getElementById("power").valueAsNumber;
            
            if(isNaN(amount) || isNaN(temp)|| isNaN(power)) {
                document.getElementById("output").innerText = "Please fill all the fields!";
                return;
            }
            water = new Water(amount, temp);
            water.setPower(power);
            document.getElementById("output").innerText = 
            `Water placed in the freezer and the current temperature is ${water.getTemperature().toFixed(2)} C`;
        }
        //cooling for 1sec, has a check for if the user created a water container
        function coolForSecond(){
            if(!water) {
                document.getElementById("output").innerText = "Please create the water container first";
            }
            water.coolASecond();
            document.getElementById("output").innerText = 
            `New temperature is ${water.getTemperature().toFixed(2)} C`;
        }
        
        function calculateTime(){
            if(!water){
                document.getElementById("output").innerText = "Please create the water first!";
            }
            const targetTemp= document.getElementById("target").valueAsNumber;
            document.getElementById("output").innerText = 
            `Time required is ${water.calculateCoolingTime(targetTemp).toFixed(2)} seconds`;
        }
    </script>
</head>
<body onload="startPage()">
    <h2>This is meant for freezing water.</h2>
    <div>
        <label>Water Amount: <input type="number" id="amount"></label><br><br>
        <label>Initial Temp: <input type="number" id="temp"></label><br><br>
        <label>Cooling Power: <input type="number" id="power"></label><br><br>
        <label>Target temperature: <input type="number" id="target"></label><br><br>
    </div>
    <div>
        <button onclick="startFreezer()">Start Freezer</button>
        <button onclick="coolForSecond()">Cool for 1 Second</button>
        <button onclick="calculateTime()">Calculate time</button>
    </div>
    <h2 id="output"></h2>
</body>
</html>
