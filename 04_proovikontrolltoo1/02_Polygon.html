<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polygon</title>
    <script src="02_Polygon.js"></script>
    <script>
        function start(){
            const canvas=document.getElementById("board1");
            const ctx=canvas.getContext("2d");
            p1=new Polygon([20,80,20],[30,20,19]);
            p2=new Polygon([200,80,120],[300,200,190]);
            p1.draw(ctx);
            p2.draw(ctx);
        }
    </script>
</head>
<body onload ="start()">
    <canvas id="board1" height="400" width="400"></canvas>

    
</body>
</html>
